<svg width="550" height="450" viewBox="0 0 550 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="275" cy="200" r="160" fill="url(#grad1)" />
  <!-- Inner shield shape -->
  <path d="M275 60 L380 120 L380 240 C380 310 275 360 275 360 C275 360 170 310 170 240 L170 120 Z" 
        fill="url(#grad2)" stroke="white" stroke-width="4"/>
  <!-- CS letters -->
  <text x="275" y="220" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
        fill="white" text-anchor="middle" dominant-baseline="middle">CS</text>
  <!-- Claw marks -->
  <path d="M220 260 L240 300 L230 260" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M260 270 L275 310 L270 270" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M300 260 L310 300 L320 260" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Text below -->
  <text x="275" y="410" font-family="Arial, sans-serif" font-size="42" font-weight="bold" 
        fill="#1a1a2e" text-anchor="middle">CSClaw</text>
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.9" />
    </linearGradient>
  </defs>
</svg>
